; ============================================================================
; PgBouncer Configuration for Supabase Connection Pooling
;
; Purpose: Sits between the application and Supabase PostgreSQL to manage
; connection pools efficiently. Required for serverless environments (Vercel)
; where each Lambda may open its own DB connection.
;
; Deployment: Supabase manages PgBouncer on their infrastructure. This file
; documents the recommended production settings. Apply via Supabase Dashboard
; under Settings > Database > Connection Pooling, or use this file if
; self-hosting PgBouncer.
; ============================================================================

[databases]
; Connect to the Supabase PostgreSQL instance
; Replace with actual connection details when self-hosting
* = host=db.YOUR_PROJECT_REF.supabase.co port=5432

[pgbouncer]
; ---------------------------------------------------------------------------
; Pool mode: transaction
; Each server connection is returned to the pool after a transaction completes.
; This is the only safe mode for Supabase + serverless (Vercel/Lambda) because
; session-level state (prepared statements, SET variables) is NOT preserved.
; Do NOT use 'session' mode — it defeats the purpose of pooling in serverless.
; ---------------------------------------------------------------------------
pool_mode = transaction

; ---------------------------------------------------------------------------
; Connection limits
; default_pool_size: connections per user/database pair kept open to PostgreSQL.
;   Supabase free tier allows 60 direct connections; Pro allows 200+.
;   20 pooled connections can serve hundreds of concurrent Lambda invocations.
; max_client_conn: max simultaneous client (app) connections to PgBouncer.
;   Set high enough for peak Lambda concurrency.
; min_pool_size: keep at least this many server connections warm.
; reserve_pool_size: extra connections for burst traffic.
; ---------------------------------------------------------------------------
default_pool_size = 20
min_pool_size = 2
reserve_pool_size = 5
max_client_conn = 200

; ---------------------------------------------------------------------------
; Timeouts
; server_idle_timeout: close idle server connections after 10 minutes.
;   Prevents accumulating stale connections to PostgreSQL.
; server_connect_timeout: abort if PostgreSQL doesn't respond within 15s.
; server_login_retry: wait 1s before retrying a failed server connection.
; query_timeout: kill queries running longer than 30s (safety net).
; client_idle_timeout: close idle client connections after 5 minutes.
; ---------------------------------------------------------------------------
server_idle_timeout = 600
server_connect_timeout = 15
server_login_retry = 1
query_timeout = 30
client_idle_timeout = 300

; ---------------------------------------------------------------------------
; Logging
; ---------------------------------------------------------------------------
log_connections = 0
log_disconnections = 0
log_pooler_errors = 1

; ---------------------------------------------------------------------------
; Security
; Require TLS for all connections to PostgreSQL (Supabase enforces this).
; ---------------------------------------------------------------------------
server_tls_sslmode = require

; ---------------------------------------------------------------------------
; Misc
; tcp_keepalive: detect dead connections at the TCP level.
; ignore_startup_parameters: required for compatibility with Supabase client
;   libraries that send extra parameters in transaction mode.
; ---------------------------------------------------------------------------
tcp_keepalive = 1
tcp_keepidle = 120
tcp_keepintvl = 30
ignore_startup_parameters = extra_float_digits,search_path
